<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITHANDRA OS | HUB</title>
    <style>
        :root {
            --g: #00ff41; --b: #0077ff; --r: #ff3131; --p: #bc13fe; --gold: #ffd700; --bg: #050505; --panel: #111;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* --- TASKBAR & HEADER --- */
        .top-bar { background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; letter-spacing: 2px; color: var(--g); font-size: 0.9rem; }
        
        /* --- ICON GRID --- */
        .desktop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; max-width: 600px; margin: 0 auto; }
        .app-icon { text-align: center; text-decoration: none; color: #fff; transition: 0.3s; }
        .app-icon:active { transform: scale(0.9); }
        
        .icon-shape { 
            width: 60px; height: 60px; margin: 0 auto 8px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            background: var(--panel); border: 1px solid #222; font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .app-label { font-size: 0.65rem; font-weight: 500; text-transform: uppercase; color: #888; }

        /* --- SAVE/DATA PANEL --- */
        .data-vault { background: var(--panel); margin: 20px; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .vault-title { font-size: 0.8rem; color: var(--g); margin-bottom: 15px; display: block; border-bottom: 1px solid #222; padding-bottom: 5px; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: var(--g); padding: 10px; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        .save-btn { background: var(--g); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-top: 10px; width: 100%; }

        /* --- COLORS --- */
        .c-p { border-color: var(--p); color: var(--p); }
        .c-r { border-color: var(--r); color: var(--r); }
        .c-g { border-color: var(--g); color: var(--g); }
        .c-b { border-color: var(--b); color: var(--b); }
        .c-gold { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">SITHANDRA_v3.0</div>
        <div id="clock" style="font-size: 0.7rem; color: #666;"></div>
    </div>

    <div class="desktop-grid">
        <a href="shadows/" class="app-icon">
            <div class="icon-shape c-p">📜</div>
            <span class="app-label">Shadows</span>
        </a>
        <a href="array/" class="app-icon">
            <div class="icon-shape c-r">📈</div>
            <span class="app-label">Array</span>
        </a>
        <a href="shield/" class="app-icon">
            <div class="icon-shape c-g">🛡️</div>
            <span class="app-label">Shield</span>
        </a>
        <a href="masonry/" class="app-icon">
            <div class="icon-shape" style="border-color:#ff6a00; color:#ff6a00;">🧱</div>
            <span class="app-label">Masonry</span>
        </a>
        <a href="botanicals/" class="app-icon">
            <div class="icon-shape" style="border-color:#2ecc71; color:#2ecc71;">🌿</div>
            <span class="app-label">Herbs</span>
        </a>
        <a href="legacy/" class="app-icon">
            <div class="icon-shape c-gold">🔒</div>
            <span class="app-label">Legacy</span>
        </a>
    </div>

    <div class="data-vault">
        <span class="vault-title">QUICK_SAVE_NOTES (LOCAL_STORAGE)</span>
        <textarea id="vaultNotes" rows="4" placeholder="Enter data to save in the hub..."></textarea>
        <button class="save-btn" onclick="saveData()">SYNC DATA TO NODE</button>
        <div id="saveStatus" style="font-size: 0.6rem; margin-top: 10px; text-align: center;"></div>
    </div>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Save Functionality
        function saveData() {
            const data = document.getElementById('vaultNotes').value;
            localStorage.setItem('sithandra_notes', data);
            const status = document.getElementById('saveStatus');
            status.innerText = "DATA ENCRYPTED & SAVED LOCALLY";
            status.style.color = "var(--g)";
            setTimeout(() => { status.innerText = ""; }, 3000);
        }

        // Load Functionality
        window.onload = () => {
            const saved = localStorage.getItem('sithandra_notes');
            if (saved) document.getElementById('vaultNotes').value = saved;
        }
    </script>
</body>
</html>
