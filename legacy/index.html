<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITHANDRA | GATEKEEPER</title>
    <style>
        :root { --g: #00ff41; --bg: #050505; --gold: #ffd700; }
        body { background: var(--bg); color: var(--g); font-family: monospace; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .vault-box { border: 1px solid #222; padding: 30px; width: 85%; max-width: 350px; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { background: transparent; border: none; border-bottom: 2px solid #222; color: var(--g); text-align: center; font-size: 1.5rem; width: 100%; outline: none; margin: 20px 0; letter-spacing: 5px; }
        .hidden { display: none; }
        .legacy-content { color: var(--gold); }
        .btn { border: 1px solid var(--g); color: var(--g); padding: 10px; text-decoration: none; display: block; margin-top: 20px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gatekeeper" class="vault-box">
        <div style="font-size: 0.7rem; color: #444; margin-bottom: 10px;">[ LEGACY_VAULT_ENCRYPTED ]</div>
        <div style="font-size: 1.2rem; letter-spacing: 2px;">ENTER_PIN</div>
        <input type="password" id="pinInput" maxlength="4" placeholder="****" oninput="checkPin()">
        <div id="msg" style="font-size: 0.6rem; color: #300;">STATUS: WAITING_FOR_AUTH</div>
        <a href="../" class="btn" style="border-color:#444; color:#444;">ABORT_ACCESS</a>
    </div>

    <div id="content" class="vault-box hidden legacy-content">
        <h2 style="letter-spacing:5px;">AYESHA_GONTLE</h2>
        <p style="font-style:italic; color:#888; font-size:0.9rem;">"Building a kingdom for the next generation."</p>
        <div style="border-top: 1px solid #222; margin-top: 20px; padding-top: 20px; font-size: 0.8rem; color: var(--gold);">
            DEPOSIT: FUTURE_FUNDS<br>
            STATUS: SECURE
        </div>
        <a href="../" class="btn" style="border-color:var(--gold); color:var(--gold);">RETURN_TO_HUB</a>
    </div>

    <script>
        function checkPin() {
            const input = document.getElementById('pinInput').value;
            const msg = document.getElementById('msg');
            // Using your vault PIN: 2000
            if (input === '2000') {
                document.getElementById('gatekeeper').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } else if (input.length === 4) {
                msg.innerHTML = "STATUS: ACCESS_DENIED";
                msg.style.color = "#ff3131";
                setTimeout(() => { 
                    document.getElementById('pinInput').value = ''; 
                    msg.innerHTML = "STATUS: WAITING_FOR_AUTH";
                    msg.style.color = "#300";
                }, 1000);
            }
        }
    </script>
</body>
</html>
